
<meta charset="utf-8">

<!-- Load d3.js -->
<script type="text/javascript" src="https://cdnjs.cloudflare.com/ajax/libs/d3/5.15.0/d3.js"></script>

<!-- Create a div where the graph will take place -->
<div id="my_dataviz"></div>

<!-- Color scale -->
<!--<script type="text/javascript" src="{{ "/assets/js/d3-scale-chromatic.v1.min.js" | prepend: site.baseurl }}"></script>-->

<script>

  // set the dimensions and margins of the graph
  var width = 450
      height = 450
      margin = 100
  
  // The radius of the pieplot is half the width or half the height (smallest one). I subtract a bit of margin.
  var radius = Math.min(width, height) / 2 - margin
  
  // append the svg object to the div called 'my_dataviz'
  var svg = d3.select("#my_dataviz")
    .append("svg")
      .attr("width", width)
      .attr("height", height)
    .append("g")
      .attr("transform", "translate(" + width / 2 + "," + height / 2 + ")");
  
  // Create dummy data
  var data = {
    "Python": 30,
    "Processing": 20,
    "Haskell": 15,
    "C/C++": 15,
    "Julia": 15,
    "Java": 5,
    "JS": 5,
    "C#": 5
  }
  
  // set the color scale
  //var color = d3.scaleOrdinal()
  //  .domain(data)
  //  .range(d3.schemeSet2);
  
  // Compute the position of each group on the pie:
  var pie = d3.pie()
    .value(function(d) {return d.value; })
  var data_ready = pie(d3.entries(data))
  // Now I know that group A goes from 0 degrees to x degrees and so on.

  // shape helper to build arcs:
  var arcGenerator = d3.arc()
    .innerRadius(0)
    .outerRadius(radius)

  function midAngle(d){
		return d.startAngle + (d.endAngle - d.startAngle)/2;
	}
  
  // Build the pie chart: Basically, each part of the pie is a path that we build using the arc function.
  svg
    .selectAll('mySlices')
    .data(data_ready)
    .enter()
    .append('path')
      .attr('d', arcGenerator)
      //.attr('fill', function(d){ return(color(d.data.key)) })
      .attr('fill', function(d){ return "red" })
      .attr("stroke", "black")
      .style("stroke-width", "2px")
      .style("opacity", 0.7)
    .on("mouseover", function(d) {
      d3.select(this).style("fill", "white");
      d3.select(this).style("stroke-width", "4px");
    })
    .on("mouseout", function(d) {
      //d3.select(this).style("fill", color(d.data.key));
      d3.select(this).style("fill", "red");
      d3.select(this).style("stroke-width", "2px");
    });
  
  // Now add the annotation. Use the centroid method to get the best coordinates
  svg
    .selectAll('mySlices')
    .data(data_ready)
    .enter()
    .append('text')
    .text(function(d){ return d.data.key})
    .attr("transform", function(d) {
      var pos = arcGenerator.centroid(d);
      pos[0] *= 2.75
      pos[1] *= 2.75
      return "translate(" + pos + ")"
      })
    .style("text-anchor", "middle")
    .style("font-size", 17);
  
  svg
    .selectAll('mySlices')
    .data(data_ready)
    .enter()
    .append('text')
    .text(function(d){ return d.data.value + "%"})
    .attr("transform", function(d) {
      var pos = arcGenerator.centroid(d);
      pos[0] *= 1.6
      pos[1] *= 1.6
      return "translate(" + pos + ")"
      })
    .style("text-anchor", "middle")
    .style("font-size", 12);
    
  
  </script>
